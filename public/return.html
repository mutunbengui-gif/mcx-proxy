<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resultado</title>
</head>

<body style="font-family:Arial;text-align:center;padding-top:100px">

<h2 id="status">A verificar pagamento...</h2>

<button onclick="location.href='/'">Tentar novamente</button>

<script>
async function check() {

  const ref = new URLSearchParams(location.search).get("ref");

  if (!ref) {
    document.getElementById("status").innerText = "Referência inválida";
    return;
  }

  const res = await fetch("/status/" + ref);
  const data = await res.json();

  if (data.status === "SUCCESS") {
    document.getElementById("status").innerText = "✅ SUCESSO";
  }

  else if (data.status === "ERROR") {
    document.getElementById("status").innerText = "❌ FALHOU";
  }

  else {
    setTimeout(check, 3000);
  }
}

check();
</script>

</body>
</html>

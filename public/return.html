<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resultado</title>

<style>
body {
  font-family: Arial;
  background:#0a2540;
  color:white;
  text-align:center;
  padding-top:100px;
}
</style>
</head>

<body>

<h2 id="status">A verificar pagamento...</h2>

<button onclick="window.location.href='/'">
Tentar novamente
</button>

<script>
async function check() {

  const ref = new URLSearchParams(window.location.search).get("ref");

  const res = await fetch("/status/" + ref);
  const data = await res.json();

  if (data.status === "SUCCESS") {
    document.getElementById("status").innerText = "✅ SUCESSO";
  }

  else if (data.status === "ERROR") {
    document.getElementById("status").innerText = "❌ FALHOU";
  }

  else {
    setTimeout(check, 3000);
  }
}

check();
</script>

</body>
</html>

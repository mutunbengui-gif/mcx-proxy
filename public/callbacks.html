<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Callbacks MCX</title>
</head>

<body style="font-family:Arial;background:#0a2540;color:white">

<h2>📡 Callbacks MCX</h2>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/callbacks");
  const data = await res.json();

  const div = document.getElementById("list");
  div.innerHTML = "";

  data.slice(-30).reverse().forEach(item => {
    const box = document.createElement("pre");
    box.style.background = "#ffffff10";
    box.style.padding = "10px";
    box.style.margin = "10px";
    box.textContent = JSON.stringify(item, null, 2);
    div.appendChild(box);
  });
}

setInterval(load, 4000);
load();
</script>

</body>
</html>

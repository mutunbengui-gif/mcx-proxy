<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Callbacks</title>

<style>
body {
  font-family: Arial;
  background:#0a2540;
  color:white;
  padding:20px;
}

.card {
  background:#ffffff10;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📡 Callbacks EMIS</h2>
<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/callbacks");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.reverse().forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "<pre>"+JSON.stringify(c,null,2)+"</pre>";
    container.appendChild(div);
  });
}

setInterval(load, 5000);
load();
</script>

</body>
</html>

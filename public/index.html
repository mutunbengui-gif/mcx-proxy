<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCX Payment</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0a2540,#1e3c72);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#ffffff10;
  padding:30px;
  border-radius:15px;
  width:320px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button {
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>💳 MCX Express</h2>

<input id="amount" type="number" value="100" />
<input id="reference" value="pedido123" />

<button onclick="pay()">PAGAR NO MCX EXPRESS</button>
</div>

<script>
async function pay() {

  const amount = document.getElementById("amount").value;
  const reference = document.getElementById("reference").value;

  const res = await fetch("/deeplink", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: Number(amount),
      reference
    })
  });

  const data = await res.json();

  window.location.href = data.deeplink;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>MCX Pay</title>
</head>
<body>

<h2>Pagamento MCX</h2>

<input id="amount" placeholder="Valor" />
<input id="phone" placeholder="Telefone" />

<button onclick="pay()">PAGAR NO MCX EXPRESS</button>

<script>
async function pay() {
  const payload = {
    amount: document.getElementById("amount").value,
    posId: "2096",
    config: {
      viewType: "QR_CODE",
      reference: "WEB123",
      size: "LARGE",
      type: "DYNAMIC",
      description: "Pagamento Web"
    },
    notify: {
      callbackUrl: {
        value: "https://mcx-proxy.onrender.com/mcx/callback",
        active: true
      },
      mobile: {
        value: document.getElementById("phone").value,
        active: true
      }
    }
  };

  const res = await fetch("/mcx/charge", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  // abre MCX EXPRESS
  window.location.href = data.deeplink;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MCX Pay</title>
</head>
<body style="font-family:Arial;text-align:center;padding-top:50px">

<h2>Pagamento MCX Express</h2>

<input id="amount" placeholder="Valor" /><br><br>
<input id="phone" placeholder="Telefone" /><br><br>
<input id="reference" placeholder="Referência" /><br><br>

<button onclick="pay()">PAGAR NO MCX EXPRESS</button>

<script>
async function pay() {

  const payload = {
    amount: Number(document.getElementById("amount").value),
    posId: "2096",
    config: {
      viewType: "QR_CODE",
      reference: document.getElementById("reference").value,
      size: "LARGE",
      type: "DYNAMIC",
      description: "Pagamento MCX Web"
    },
    notify: {
      callbackUrl: {
        value: window.location.origin + "/mcx/callback",
        active: true
      },
      mobile: {
        value: document.getElementById("phone").value,
        active: true
      }
    }
  };

  const res = await fetch("/mcx/charge", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.deeplink) {
    window.location.href = data.deeplink;
  } else {
    alert("Erro ao iniciar pagamento");
  }
}
</script>

</body>
</html>
